<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Face Detect - 面部视差</title>
	<link rel="stylesheet" href="css/style.css">
</head>
<body>
	<main class="app-shell">
		<section class="stage-panel">
			<div class="stage-frame">
				<canvas id="stage" width="1000" height="1000" aria-label="视差预览"></canvas>
				<div class="status-bar" id="status">等待加载</div>
			</div>
			<div class="hint">
				摄像头读取面部位置与头部倾斜，驱动背景、人物、logo 三层视差
			</div>
		</section>

		<aside class="control-panel">
			<h1>单图视差控制台</h1>

			<label class="field">
				<span>选择素材</span>
				<select id="imageSelect"></select>
			</label>

			<div class="button-row">
				<button id="cameraButton" type="button">开启摄像头</button>
				<button id="resetButton" type="button" class="ghost">重置参数</button>
			</div>

			<section class="group">
				<h2>响应</h2>
				<label class="field range">
					<span>响应速度</span>
					<input id="response" type="range" min="0.05" max="0.45" step="0.01" value="0.22">
					<output id="responseValue">0.22</output>
				</label>
				<label class="field range">
					<span>X 轴幅度</span>
					<input id="xStrength" type="range" min="10" max="90" step="1" value="44">
					<output id="xStrengthValue">44</output>
				</label>
				<label class="field range">
					<span>Y 轴幅度</span>
					<input id="yStrength" type="range" min="8" max="70" step="1" value="30">
					<output id="yStrengthValue">30</output>
				</label>
				<label class="field range">
					<span>倾斜幅度</span>
					<input id="tiltStrength" type="range" min="2" max="20" step="0.5" value="8">
					<output id="tiltStrengthValue">8</output>
				</label>
			</section>

			<section class="group">
				<h2>人物蒙版</h2>
				<label class="field range">
					<span>中心 X</span>
					<input id="maskX" type="range" min="0.25" max="0.75" step="0.01" value="0.5">
					<output id="maskXValue">0.50</output>
				</label>
				<label class="field range">
					<span>中心 Y</span>
					<input id="maskY" type="range" min="0.28" max="0.82" step="0.01" value="0.57">
					<output id="maskYValue">0.57</output>
				</label>
				<label class="field range">
					<span>半径 X</span>
					<input id="maskW" type="range" min="0.18" max="0.46" step="0.01" value="0.34">
					<output id="maskWValue">0.34</output>
				</label>
				<label class="field range">
					<span>半径 Y</span>
					<input id="maskH" type="range" min="0.22" max="0.52" step="0.01" value="0.44">
					<output id="maskHValue">0.44</output>
				</label>
				<label class="field range">
					<span>羽化</span>
					<input id="feather" type="range" min="0.04" max="0.22" step="0.01" value="0.11">
					<output id="featherValue">0.11</output>
				</label>
			</section>

			<section class="group">
				<h2>Logo 裁切</h2>
				<label class="field range">
					<span>起点 X</span>
					<input id="logoX" type="range" min="0.58" max="0.82" step="0.01" value="0.67">
					<output id="logoXValue">0.67</output>
				</label>
				<label class="field range">
					<span>起点 Y</span>
					<input id="logoY" type="range" min="0.00" max="0.18" step="0.01" value="0.02">
					<output id="logoYValue">0.02</output>
				</label>
				<label class="field range">
					<span>宽度</span>
					<input id="logoW" type="range" min="0.14" max="0.34" step="0.01" value="0.28">
					<output id="logoWValue">0.28</output>
				</label>
				<label class="field range">
					<span>高度</span>
					<input id="logoH" type="range" min="0.08" max="0.24" step="0.01" value="0.16">
					<output id="logoHValue">0.16</output>
				</label>
			</section>

			<video id="camera" playsinline muted hidden></video>
		</aside>
	</main>

	<script>console.log("脚本加载了");</script>
	<script src="js/app.js"></script>
</body>
</body>
</html>
